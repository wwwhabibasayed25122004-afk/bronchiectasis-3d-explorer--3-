<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bronchiectasis: Pathophysiology Explorer</title>
    
    <!-- Professional Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0a0c;
            --accent-primary: #4cc9f0;
            --accent-secondary: #4361ee;
            --panel-bg: rgba(15, 15, 20, 0.9);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8f9fa;
            --text-dim: #94a3b8;
            --correct: #4ade80;
            --incorrect: #f87171;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, #16213e 0%, #0a0a0c 100%);
        }

        .overlay {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 28px;
            pointer-events: auto;
            box-shadow: var(--shadow);
        }

        #header-panel {
            top: 40px;
            left: 40px;
            max-width: 400px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(90deg, var(--accent-primary), #fff);
            -webkit-background-clip: text;
            background-clip: text; /* FIX: Added standard property for compatibility */
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #script-panel {
            top: 40px;
            right: 40px;
            max-width: 350px;
            text-align: right;
            border-right: 4px solid var(--accent-primary);
        }

        #script-text {
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 400;
            color: var(--text-main);
            min-height: 3em;
        }

        #timeline-container {
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1100px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        #play-btn {
            background: var(--accent-primary);
            border: none;
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 0 15px rgba(76, 201, 240, 0.4);
            transition: transform 0.2s;
        }

        #play-btn:hover { transform: scale(1.1); }

        #scrubber-track {
            flex-grow: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        #scrubber-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary));
            border-radius: 4px;
            box-shadow: 0 0 12px var(--accent-primary);
        }

        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #start-btn {
            margin-top: 30px;
            padding: 22px 70px;
            font-size: 1.3rem;
            background: var(--accent-primary);
            border: none;
            border-radius: 60px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(76, 201, 240, 0.3);
            transition: all 0.3s;
        }

        #start-btn:hover {
            letter-spacing: 2px;
            background: #fff;
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(15px);
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 12px 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .option-btn:hover { background: rgba(255, 255, 255, 0.08); }
        .option-btn.correct { background: var(--correct) !important; color: #000; font-weight: 600; }
        .option-btn.incorrect { background: var(--incorrect) !important; }

        #error-display {
            position: fixed;
            bottom: 30px;
            left: 30px;
            max-width: 450px;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid var(--incorrect);
            color: var(--incorrect);
            padding: 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            z-index: 3000;
            display: none;
            backdrop-filter: blur(10px);
            line-height: 1.5;
        }

        code { background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h2 style="font-weight: 300; letter-spacing: 8px; text-transform: uppercase; color: var(--text-dim);">Biology Module</h2>
        <h1 style="font-size: 3.5rem; -webkit-text-fill-color: white;">BRONCHIECTASIS</h1>
        <p style="margin-top: 10px; opacity: 0.6;">3D Pathophysiology Visualization & Assessment</p>
        <button id="start-btn">INITIALIZE LESSON</button>
    </div>

    <div id="canvas-container"></div>

    <div id="header-panel" class="overlay glass-panel">
        <p class="subtitle">STEM Explorer</p>
        <h1>Anatomy & Pathology</h1>
        <p style="font-size: 0.85rem; opacity: 0.7; margin-top: 8px;">
            Interactive study of bronchial wall structural failure.
        </p>
    </div>

    <div id="script-panel" class="overlay glass-panel">
        <div id="script-text">System Standby...</div>
    </div>

    <div id="timeline-container" class="overlay glass-panel">
        <button id="play-btn">▶</button>
        <div id="scrubber-track">
            <div id="scrubber-progress"></div>
        </div>
        <div id="time-display" style="font-size: 0.9rem; font-family: monospace; width: 60px; text-align: right;">00:00</div>
    </div>

    <div id="modal-overlay">
        <div id="question-modal" class="glass-panel" style="max-width: 550px; text-align: center;">
            <div style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; color: var(--accent-primary); margin-bottom: 10px;">Knowledge Check</div>
            <h3 id="modal-question" style="margin-bottom: 25px; font-size: 1.2rem;"></h3>
            <div id="modal-options"></div>
        </div>
    </div>

    <div id="error-display"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const CONFIG = {
            audio: './audio/biology-script.mp3',
            models: {
                lung: './models/lung.glb',
                alveoli: './models/alveoli.glb',
                types: './models/types.glb'
            },
            timing: {
                transitionAlveoli: 120, 
                transitionTypes: 180    
            }
        };

        const state = {
            isPlaying: false,
            currentTime: 0,
            duration: 0,
            isModalOpen: false,
            breathingPhase: 0,
            activeModel: 'lung',
            models: { lung: null, alveoli: null, types: null },
            questionsTriggered: new Set()
        };

        const lessonData = {
            milestones: [
                { time: 0, text: "Begin by examining the baseline bronchial tree structure." },
                { time: 25, text: "Pathology: Bronchiectasis causes permanent, irreversible widening.", question: 0 },
                { time: 60, text: "The inflammation destroys the elastic and muscular components of the wall." },
                { time: 120, text: "Focus Shift: Alveolar sacs showing signs of mucus stasis.", question: 1 },
                { time: 145, text: "Impaired ciliary clearance creates a 'vicious cycle' of infection." },
                { time: 180, text: "Morphological Types: Cylindrical, Varicose, and Cystic forms." },
                { time: 205, text: "Final Assessment: Impacts on total lung capacity and ventilation.", question: 2 }
            ],
            questions: [
                { 
                    q: "What is the primary anatomical feature of Bronchiectasis?", 
                    options: [
                        { t: "Temporary narrowing of the bronchi", l: "A" },
                        { t: "Permanent dilation of the airways", l: "B" }
                    ], 
                    correct: "B" 
                },
                { 
                    q: "Which defense mechanism fails, leading to mucus stasis?", 
                    options: [
                        { t: "The Mucociliary Escalator", l: "A" },
                        { t: "White blood cell production", l: "B" }
                    ], 
                    correct: "A" 
                },
                { 
                    q: "Inflammation in this condition is usually:", 
                    options: [
                        { t: "Acute and resolving", l: "A" },
                        { t: "Chronic and progressive", l: "B" }
                    ], 
                    correct: "B" 
                }
            ]
        };

        const audio = new Audio(CONFIG.audio);
        let scene, camera, renderer, controls;
        const loader = new THREE.GLTFLoader();

        function reportError(msg) {
            const el = document.getElementById('error-display');
            el.innerHTML = `<strong>DEVELOPER NOTICE:</strong><br>${msg}`;
            el.style.display = 'block';
        }

        function initApp() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0c);
            scene.fog = new THREE.FogExp2(0x0a0a0c, 0.02);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 14);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
            keyLight.position.set(5, 10, 7);
            scene.add(keyLight);

            // FIX: Replaced CSS var() with actual hex code for Three.js
            const fillLight = new THREE.PointLight(0x4cc9f0, 0.5);
            fillLight.position.set(-5, -5, 5);
            scene.add(fillLight);

            loadLessonAssets();
            startAnimationLoop();
        }

        function loadLessonAssets() {
            Object.entries(CONFIG.models).forEach(([key, path]) => {
                loader.load(path, (gltf) => {
                        const model = gltf.scene;
                        model.visible = false;
                        const box = new THREE.Box3().setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        model.position.sub(center);
                        scene.add(model);
                        state.models[key] = model;
                    }, 
                    undefined, 
                    (err) => {
                        if (key === 'lung') {
                            reportError(`Missing Asset: <code>${path}</code><br>Please check <code>./models/README.md</code>.`);
                            generateGeometryFallback();
                        }
                    }
                );
            });
        }

        function generateGeometryFallback() {
            const lungGroup = new THREE.Group();
            const geometry = new THREE.SphereGeometry(2.5, 32, 32);
            const material = new THREE.MeshPhongMaterial({ color: 0xcc6666, transparent: true, opacity: 0.7, wireframe: true });
            const leftLung = new THREE.Mesh(geometry, material);
            leftLung.position.x = -2.5; leftLung.scale.set(0.8, 1.4, 0.6);
            const rightLung = new THREE.Mesh(geometry, material);
            rightLung.position.x = 2.5; rightLung.scale.set(0.8, 1.4, 0.6);
            lungGroup.add(leftLung, rightLung);
            lungGroup.visible = false;
            state.models.lung = lungGroup;
            scene.add(lungGroup);
        }

        function startAnimationLoop() {
            requestAnimationFrame(startAnimationLoop);
            if (controls) controls.update();
            if (state.isPlaying && !state.isModalOpen) {
                state.breathingPhase += 0.025;
                synchronizeLesson();
                Object.values(state.models).forEach(m => {
                    if (m && m.visible) {
                        const scaleMultiplier = 1 + Math.sin(state.breathingPhase) * 0.04;
                        m.scale.set(scaleMultiplier, scaleMultiplier, scaleMultiplier);
                        m.rotation.y += 0.0015;
                    }
                });
            }
            if (renderer) renderer.render(scene, camera);
        }

        function synchronizeLesson() {
            state.currentTime = audio.currentTime;
            state.duration = audio.duration || 0;
            const progressPercent = (state.currentTime / state.duration) * 100 || 0;
            document.getElementById('scrubber-progress').style.width = `${progressPercent}%`;
            const mins = Math.floor(state.currentTime / 60);
            const secs = Math.floor(state.currentTime % 60);
            document.getElementById('time-display').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;

            if (state.models.lung) state.models.lung.visible = (state.currentTime < CONFIG.timing.transitionAlveoli);
            if (state.models.alveoli) state.models.alveoli.visible = (state.currentTime >= CONFIG.timing.transitionAlveoli && state.currentTime < CONFIG.timing.transitionTypes);
            if (state.models.types) state.models.types.visible = (state.currentTime >= CONFIG.timing.transitionTypes);

            lessonData.milestones.forEach(m => {
                if (state.currentTime >= m.time) {
                    updateScriptText(m.text);
                    if (m.question !== undefined && !state.questionsTriggered.has(m.question)) presentQuiz(m.question);
                }
            });
        }

        function updateScriptText(text) {
            const el = document.getElementById('script-text');
            if (el.innerText !== text) {
                el.style.opacity = '0';
                setTimeout(() => { el.innerText = text; el.style.opacity = '1'; }, 200);
            }
        }

        function presentQuiz(index) {
            state.isModalOpen = true;
            state.questionsTriggered.add(index);
            audio.pause();
            const quiz = lessonData.questions[index];
            const modal = document.getElementById('modal-overlay');
            document.getElementById('modal-question').innerText = quiz.q;
            const container = document.getElementById('modal-options');
            container.innerHTML = '';
            quiz.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${opt.l}: ${opt.t}`;
                btn.onclick = () => {
                    if (opt.l === quiz.correct) {
                        btn.classList.add('correct');
                        btn.innerText = "Correct! Resuming...";
                        setTimeout(() => { modal.style.display = 'none'; state.isModalOpen = false; if (state.isPlaying) audio.play(); }, 1200);
                    } else { btn.classList.add('incorrect'); }
                };
                container.appendChild(btn);
            });
            modal.style.display = 'flex';
        }

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('intro-screen').style.display = 'none'; }, 800);
            initApp();
            audio.play().then(() => { state.isPlaying = true; document.getElementById('play-btn').innerText = '⏸'; })
                .catch(() => reportError("Audio context blocked or file missing in <code>audio/</code> folder."));
        };

        document.getElementById('play-btn').onclick = () => {
            if (state.isModalOpen) return;
            state.isPlaying = !state.isPlaying;
            if (state.isPlaying) audio.play(); else audio.pause();
            document.getElementById('play-btn').innerText = state.isPlaying ? '⏸' : '▶';
        };

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        document.getElementById('scrubber-track').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audio.duration) audio.currentTime = percent * audio.duration;
        };
    </script>
</body>
</html>
